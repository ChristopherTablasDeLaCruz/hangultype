name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  client:
    name: Client (lint, types, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Dummy values so prerendering succeeds; real values come from the
          # deployment platform, not CI.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-dummy-anon-key
          NEXT_PUBLIC_API_URL: http://localhost:8000

  server:
    name: Server (tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: server/uv.lock

      - name: Install dependencies
        run: uv sync --dev

      - name: Test
        run: uv run pytest -q
